<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StaminaGym - Shop</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Raleway:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="shop.css">
</head>
<body>

  <header>
    <h1>Shop Our Products</h1>
    <p>Supplements, apparel, accessories, and gym equipment.</p>
  </header>

  <!-- FILTERS -->
  <section class="shop-controls">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search products...">
    </div>

    <div class="filters">
      <button data-category="all">All</button>
      <button data-category="supplements">Supplements</button>
      <button data-category="apparel">Apparel</button>
      <button data-category="accessories">Accessories</button>
      <button data-category="equipment">Equipment</button>
    </div>

    <div class="sort-box">
      <label for="sortSelect">Sort by:</label>
      <select id="sortSelect">
        <option value="default">Default</option>
        <option value="price-low">Price Low to High</option>
        <option value="price-high">Price High to Low</option>
        <option value="rating-high">Rating</option>
      </select>
    </div>
  </section>

  <!-- PRODUCTS GRID -->
  <section class="products-grid" id="productsGrid">
    <!-- Products will be added by JavaScript -->
  </section>

  <!-- CART -->
  <section class="cart-section">
    <h2>Shopping Cart</h2>
    <div id="cartItems"></div>
    <p class="cart-total">Total: $<span id="cartTotal">0</span></p>
    <input type="text" id="discountCode" placeholder="Enter discount code">
    <button id="applyDiscountBtn">Apply Code</button>
    <p id="discountMessage"></p>
    <button id="checkoutBtn">Checkout</button>
    <p id="checkoutMessage"></p>
  </section>

  <!-- PRODUCT MODAL -->
  <div class="modal" id="productModal">
    <div class="modal-content">
      <span class="close-btn" id="closeModalBtn">&times;</span>
      <div id="modalDetails"></div>
    </div>
  </div>

  <!-- WISHLIST -->
  <section class="wishlist-section">
    <h2>Wishlist</h2>
    <div id="wishlistItems"></div>
  </section>

  <script src="shop.js"></script>
</body>
</html>
