<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StaminaGym - Checkout</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Raleway:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="checkout.css">
</head>
<body>

  <header>
    <h1>Checkout</h1>
    <p>Complete your order details below.</p>
  </header>

  <section class="checkout-section">
    <div class="checkout-form">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" placeholder="Enter your full name" maxlength="20" required>
      </div>

      <div class="form-group">
        <label for="emailAddress">Email</label>
        <input type="email" id="emailAddress" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label for="phoneNumber">Phone</label>
        <input type="text" id="phoneNumber" placeholder="Enter your phone number" maxlength="15" required>
      </div>

      <div class="form-group">
        <label for="addressInput">Address</label>
        <input type="text" id="addressInput" placeholder="Enter your address" required>
      </div>

      <div class="form-group">
        <label for="paymentMethod">Payment Method</label>
        <select id="paymentMethod">
          <option value="">Select payment method</option>
          <option value="cash">Cash on Delivery</option>
          <option value="card">Credit / Debit Card</option>
        </select>
      </div>

      <button id="placeOrderBtn">Place Order</button>
      <p id="checkoutMessage"></p>
    </div>

    <div class="order-summary">
      <h2>Order Summary</h2>
      <div id="checkoutItems"></div>
      <p class="checkout-total">Total: $<span id="checkoutTotal">0</span></p>
    </div>
  </section>

  <script src="checkout.js"></script>
</body>
</html>
